{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Продуктивность</h2>

    <div class="card p-4">
        <p><strong>Всего задач:</strong> {{ stats.total_tasks }}</p>
        <p><strong>Выполнено:</strong> {{ stats.completed_tasks }}</p>
        <p><strong>Активные:</strong> {{ stats.pending_tasks }}</p>
        <p><strong>Выполнено за 7 дней:</strong> {{ stats.completed_this_week }}</p>
        <p><strong>Процент выполнения:</strong> {{ stats.completion_rate }}%</p>
    </div>
</div>
{% endblock %}
